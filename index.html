        { text: "A new leader takes over at a school with high teacher turnover... most useful first step?", options: ["A. Surveying permanent teaching staff", "B. Conducting extensive exit interviews with probationary teachers who have left", "C. Reviewing current literature", "D. Distributing a survey to parents"], ans: 1 },
        { text: "As part of crisis response plan... to maximize effectiveness, it is most important to ensure:", options: ["A. Responsibilities of each individual are clearly defined", "B. Each individual reports to at least two others", "C. Overall leadership spread among several", "D. Membership drawn from longest-serving staff"], ans: 0 },
        { text: "In determining resources for English language learner program, educational leaders should first:", options: ["A. Evaluate success of the program", "B. Calculate proportion of total revenues", "C. Project resources needed to maintain other programs", "D. Identify state and federal mandates and categorical aid"], ans: 3 },
        { text: "Administrators find marijuana... Goss v. Lopez requires before suspension:", options: ["A. Review locker search manner", "B. Provide legal advice", "C. Arrange for an impartial hearing", "D. Demonstrate nondiscriminatory application"], ans: 2 }
      ];

      // EDUC 234 (10)
      subjects[8].questions = [
        { text: "In trying to understand others what must be your attitude toward yourself?", options: ["A. Adopt the attitude that the boss can't be wrong.", "B. Don't think about yourself at all.", "C. Know your weakness and make allowance for the weakness of others.", "D. All of the above"], ans: 2 },
        { text: "Effective motivation is evidenced by", options: ["A. Employees taking pride in their work", "B. Employees coordinating their work with others", "C. Employees concentrating and suggesting improvements", "D. All of the above"], ans: 3 },
        { text: "To a group of experienced workers it is common to use;", options: ["A. implied orders", "B. Request orders", "C. Suggestive orders", "D. Command orders"], ans: 0 },
        { text: "COMMUNICATION IS;", options: ["A. a One-way process", "B. a two-way process", "C. a three-way process", "D. a multi process"], ans: 1 },
        { text: "The best performance is obtained from individuals by;", options: ["A. Giving orders", "B. criticizing them often", "C. showing an interest in their feelings", "D. Assigning higher quotes"], ans: 2 },
        { text: "in handling complaints. Best producer for a principal must;", options: ["A. Discourage employee", "B. Make decision immediately", "C. Discuss complaint in presence of", "D. Various personal"], ans: 1 },
        { text: "Individuals differ because of", options: ["A. Heredity", "B. Environment", "C. Both heredity and environment", "D. Various personality traits"], ans: 2 },
        { text: "The most effective incentive to employee is", options: ["A. Control", "B. Correction", "C. Praise", "D. All of the above"], ans: 3 },
        { text: "It is about solving problems.", options: ["A. Creativity", "B. Collaboration", "C. Communication", "D. Critical Thinking"], ans: 3 },
        { text: "It can be fun and relaxed to take up teaching as a profession as you can be in the company of student which keeps you young.", options: ["A. Balancing Diverse Learning needs", "B. Limitations of disciplining students", "C. Lot of paperwork", "D. Get burn out easily"], ans: 3 }
      ];

      // EDUC 238 (10)
      subjects[9].questions = [
        { text: "An organization formed to represent the interest of workers in bargaining with employers for contracts concerning wages and other working conditions", options: ["A. Labor Union", "B. Institution", "C. Federation", "D. National Group"], ans: 0 },
        { text: "Locates competent employees and getting them to work for the organization", options: ["A. Training and Development", "B. Staffing", "C. Motivation", "D. Maintenance"], ans: 1 },
        { text: "A process of activating behavior, sustaining it and directing towards a particular goal", options: ["A. Maintenance", "B. Evaluation", "C. Motivation", "D. Compensation"], ans: 2 },
        { text: "Major activities of Staffing consist of the following except:", options: ["A. Strategic Human Resource Planning", "B. Recruitment", "C. Motivation", "D. Selection"], ans: 2 },
        { text: "Maintenance insures employee retention for better productivity except of:", options: ["A. Safety", "B. Health", "C. Communication Programs", "D. Performance Evaluation"], ans: 3 },
        { text: "A method of employee development which involves moving an employee from one position to another to broaden knowledge.", options: ["A. Formal Education", "B. Job Rotation", "C. Mentoring", "D. Special Projects"], ans: 1 },
        { text: "This refers to the pattern of work-related experiences that span the course of a person's life", options: ["A. Career", "B. Career Development", "C. Career Planning", "D. Career Management"], ans: 0 },
        { text: "Career Cycle consists of stages. Which arrangement is best. I. Growth II. Exploration III. Establishment IV. Maintenance V. Decline", options: ["A. I, II, III, IV, V", "B. II, III, I, IV, V", "C. I, IV, II, III, V", "D. V, IV, III, II, I"], ans: 0 },
        { text: "This is what the employees receive in exchange for their work.", options: ["A. Time", "B. Productivity", "C. Compensation", "D. Termination"], ans: 2 },
        { text: "The processes of communication are listed. Which process is best implemented. I. Receiving idea... II. Message Decoding III. Channel Transmission IV. Message Encoding V. Developing idea", options: ["A. I,II,III,IV,V", "B. III,II,I,IV,V", "C. II,I,III,IV,V", "D. V,IV,III,II,I"], ans: 3 }
      ];

      // COGNATE 210 (10)
      subjects[10].questions = [
        { text: "It is a process when Educators usually teach students in their native language in conjunction with a second language...", options: ["A. bilingual education", "B. dual language program", "C. ESL program", "D. k to 12 program"], ans: 0 },
        { text: "Which country has the world's best education system in the year 2020?", options: ["A. Australia", "B. Japan", "C. Netherlands", "D. United Kingdom"], ans: 3 },
        { text: "Taehak is the earliest form of formal education in what country?", options: ["A. China", "B. Japan", "C. South Korea", "D. Taiwan"], ans: 2 },
        { text: "Which country included adult education as one of their educational categories?", options: ["A. China", "B. Philippines", "C. Taiwan", "D. Vietnam"], ans: 0 },
        { text: "Who brought formal education in the Philippines?", options: ["A. Americans", "B. Japan", "C. Spaniards", "D. Spain"], ans: 2 },
        { text: "Number of years for a compulsory education in the Philippines.", options: ["A. 10", "B. 11", "C. 12", "D. 13"], ans: 3 },
        { text: "It is a discipline in the social sciences which entails the scrutiny and evaluation of different educational systems.", options: ["A. Comparative education", "B. Comprehensive education", "C. Educational management", "D. Educational planning"], ans: 0 },
        { text: "What country has the same Number of years with the Philippines for a compulsory education?", options: ["A. China", "B. Indonesia", "C. Singapore", "D. South Korea"], ans: 2 },
        { text: "The following are the reasons why K to 12 program is necessary, except:", options: ["A. High school graduates not prepared for work", "B. Graduates too young to enter labor force", "C. Not adequately willing to pursue higher education", "D. Students end up shifting courses"], ans: 2 },
        { text: "What statement is correct in terms of the education system of Japan and Philippines?", options: ["A. Both aim for quality education", "B. Both have definite grading system", "C. Both Japan and the Philippines have a standard lesson plan", "D. Both required professional license to teach in government institutions"], ans: 1 }
      ];

      // ED 239 (10)
      subjects[11].questions = [
        { text: "Administration is a process with these necessary elements except one:", options: ["A. Planning", "B. Organizing", "C. Directing", "D. Testing"], ans: 3 },
        { text: "An Element of Administration that implies analysis of the alternatives particularly the consequence in the future:", options: ["A. Organizing", "B. Planning", "C. Decision Making", "D. Directing"], ans: 2 },
        { text: "Technically, it is the organization's direction, and coordination and control of human and material resources to achieve the desired end.", options: ["A. Supervision", "B. Administration", "C. Planning", "D. Controlling"], ans: 1 },
        { text: "Refers to all efforts designated school officials directed towards providing leadership for teachers and other educational workers in the improvement of instructions.", options: ["A. Supervision", "B. Administration", "C. Planning", "D. Organizing"], ans: 0 },
        { text: "An inspectional supervisory methods in which the class was observed, but nothing was done to help the teacher improves the job.", options: ["A. Laissez-faire supervision", "B. Coercive Supervision", "C. Supervision as Training and Guidance", "D. Supervision as Democratic Professional Leadership"], ans: 0 },
        { text: "The following are the phases of clinical supervision except one:", options: ["A. Planning", "B. Observation", "C. Analysis", "D. Testing"], ans: 3 },
        { text: "Administration is a process which six elements except one are important:", options: ["A. Planning- organizing", "B. Communicating- Coordinating", "C. Evaluating & Decision Making", "D. Dictating and Consuming"], ans: 3 },
        { text: "Which is the best style of Leadership?", options: ["A. Dictatorial", "B. Authoritarian", "C. Democratic – participative leadership", "D. Laissez-faire"], ans: 2 },
        { text: "Techniques of supervision include the following except one:", options: ["A. Teacher Diagnosis", "B. Learner diagnosis", "C. Diagnosis of curricular offerings", "D. Survey of student population"], ans: 3 },
        { text: "Administration and supervision as an applied field is also common in the following area except one:", options: ["A. School", "B. Engineering", "C. Medicine", "D. History"], ans: 3 }
      ];

      // ED 240 (10)
      subjects[12].questions = [
        { text: "Which of the following is NOT a function of budgeting?", options: ["A. Decision making", "B. Controlling", "C. Planning", "D. Motivating"], ans: 0 },
        { text: "A fixed budget is _________________", options: ["A. A budget that never changes", "B. A budget that itemizes the fixed cost", "C. A budget that ignores inflation", "D. A budget that is set for a specified level activity."], ans: 3 },
        { text: "Which of the following is NOT one of the purposes of budget?", options: ["A. To enable a flexibility of approach to company policies", "B. Planning and control", "C. The alignment of individual and institutional goals.", "D. To optimize the use of scarce resources"], ans: 0 },
        { text: "What does it mean to be responsible for financial management in education?", options: ["A. To spend your own money", "B. To be responsible for oversight and reporting.", "C. To be responsible for winning grants", "D. To pay teachers by handling paychecks personally."], ans: 1 },
        { text: "The long-run objective of school financial management is to_______________.", options: ["A. maximize earnings of teachers", "B. maximize the value of the school budget.", "C. maximize return on investment.", "D. maximize share of students."], ans: 1 },
        { text: "Which school funding DOES NOT come from the government of the Philippines?", options: ["A. Maintenance and other operating expenses.", "B. Special Education Fund", "C. School-Based Feeding Program", "D. Donations from parents and private individuals."], ans: 3 },
        { text: "In an education system, financial management involves overseeing funding for which of the following?", options: ["A. Salaries and honorarium", "B. School buildings and grounds", "C. Student programs", "D. All of the answers are correct"], ans: 3 },
        { text: "In the Philippines, there is no specific education tax, the following are sources of government income to support education. Which is NOT one?", options: ["A. Excise tax specifically levied on certain goods", "B. Taxes imposed by law", "C. Tuition fees imposed on students in public high schools", "D. Rental for lease of school sites"], ans: 0 },
        { text: "Budget preparation is a complex process. Which is the correct order? a. Determine objectives... b. Prepare detailed plans... c. Priority... d. Prepare plans for implementation e. Develop evaluation plan", options: ["A. a,b,c,d,e", "B. a,c,b,d,e", "C. c,b,d,a,e", "D. e,d,c,b,a"], ans: 0 },
        { text: "There are several factors to determine financial compensation. Which factor is considered when compensation is based on consumer price index?", options: ["A. Cost of Living", "B. Government Control", "C. Prevailing Wage Level", "D. Labor Market Conditions"], ans: 0 }
      ];

      // ---------- GLOBAL STATE ----------
      let currentSubjectIndex = 0;
      let userAnswers = {}; // key: "subjIdx_qIdx" -> selected option index (0-based)
      let submitted = false;
      let totalQuestions = subjects.reduce((sum, s) => sum + s.questions.length, 0);

      // DOM elements
      const sidebar = document.getElementById('sidebar');
      const subjectListEl = document.getElementById('subjectList');
      const quizContainer = document.getElementById('quizContainer');
      const currentSubjectTitle = document.getElementById('currentSubjectTitle');
      const questionCountDisplay = document.getElementById('questionCountDisplay');
      const submitBtn = document.getElementById('submitAllBtn');
      const resetBtn = document.getElementById('resetAnswersBtn');
      const scorePanel = document.getElementById('scorePanel');
      const mobileMenuBtn = document.getElementById('mobileMenuBtn');
      const sidebarToggleBtn = document.getElementById('sidebarToggleBtn');

      // Render sidebar
      function renderSidebar() {
        subjectListEl.innerHTML = '';
        subjects.forEach((subj, idx) => {
          const li = document.createElement('li');
          li.className = `subject-item ${idx === currentSubjectIndex ? 'active' : ''}`;
          li.innerHTML = `<i>${subj.name.split(' ')[0]}</i> ${subj.name}`;
          li.addEventListener('click', () => {
            currentSubjectIndex = idx;
            submitted = false;
            renderCurrentSubject();
            renderSidebar();
            if (window.innerWidth < 720) sidebar.classList.add('collapsed');
          });
          subjectListEl.appendChild(li);
        });
      }

      function renderCurrentSubject() {
        const subj = subjects[currentSubjectIndex];
        currentSubjectTitle.textContent = subj.name;
        const questions = subj.questions;
        questionCountDisplay.textContent = `${questions.length} items`;

        let html = '';
        questions.forEach((q, qIdx) => {
          const globalKey = `${currentSubjectIndex}_${qIdx}`;
          const selected = userAnswers[globalKey] !== undefined ? userAnswers[globalKey] : null;
          let cardClass = 'question-card';
          if (submitted) {
            const isCorrect = (selected === q.ans);
            cardClass += isCorrect ? ' correct-highlight' : ' wrong-highlight';
          }
          html += `<div class="${cardClass}" data-qidx="${qIdx}">`;
          html += `<div class="q-text">${qIdx+1}. ${q.text}</div>`;
          html += `<div class="options">`;
          q.options.forEach((opt, optIdx) => {
            const checked = (selected === optIdx) ? 'checked' : '';
            html += `<div class="option">`;
            html += `<input type="radio" name="q${currentSubjectIndex}_${qIdx}" value="${optIdx}" id="opt_${currentSubjectIndex}_${qIdx}_${optIdx}" ${checked} data-subj="${currentSubjectIndex}" data-qidx="${qIdx}" data-opt="${optIdx}">`;
            html += `<label for="opt_${currentSubjectIndex}_${qIdx}_${optIdx}">${opt}</label>`;
            if (submitted) {
              if (optIdx === q.ans) html += `<span class="feedback-icon" style="color:#2b8c5e;">✓</span>`;
              else if (selected === optIdx && selected !== q.ans) html += `<span class="feedback-icon" style="color:#c23b3b;">✗</span>`;
            }
            html += `</div>`;
          });
          html += `</div></div>`;
        });
        quizContainer.innerHTML = html;

        // Attach event listeners to radio buttons
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
          radio.addEventListener('change', (e) => {
            if (submitted) return;
            const subjIdx = parseInt(radio.dataset.subj);
            const qIdx = parseInt(radio.dataset.qidx);
            const opt = parseInt(radio.value);
            userAnswers[`${subjIdx}_${qIdx}`] = opt;
          });
        });

        updateScorePanel();
      }

      function updateScorePanel() {
        if (!submitted) {
          const answered = Object.keys(userAnswers).length;
          scorePanel.textContent = `📝 Answered: ${answered} / ${totalQuestions}`;
        } else {
          let correct = 0;
          subjects.forEach((subj, sIdx) => {
            subj.questions.forEach((q, qIdx) => {
              const key = `${sIdx}_${qIdx}`;
              if (userAnswers[key] === q.ans) correct++;
            });
          });
          const percent = ((correct / totalQuestions)*100).toFixed(1);
          scorePanel.textContent = `🏆 Score: ${correct} / ${totalQuestions} (${percent}%)`;
        }
      }

      function submitAll() {
        submitted = true;
        // re-render current subject to show highlights
        renderCurrentSubject();
        updateScorePanel();
      }

      function resetAllAnswers() {
        userAnswers = {};
        submitted = false;
        renderCurrentSubject();
        updateScorePanel();
      }

      // Toggle sidebar (collapsible)
      function toggleSidebar(force) {
        if (force !== undefined) sidebar.classList.toggle('collapsed', force);
        else sidebar.classList.toggle('collapsed');
      }

      // Mobile: open sidebar
      function openSidebarMobile() {
        sidebar.classList.remove('collapsed');
      }

      // Event listeners
      mobileMenuBtn.addEventListener('click', openSidebarMobile);
      sidebarToggleBtn.addEventListener('click', () => toggleSidebar());
      submitBtn.addEventListener('click', submitAll);
      resetBtn.addEventListener('click', resetAllAnswers);

      // Handle window resize to reset sidebar for desktop
      window.addEventListener('resize', () => {
        if (window.innerWidth > 720) sidebar.classList.remove('collapsed');
        else sidebar.classList.add('collapsed');
      });

      // Initialize
      function init() {
        renderSidebar();
        renderCurrentSubject();
        if (window.innerWidth <= 720) sidebar.classList.add('collapsed');
      }
      init();
    })();
  </script>
</body>
</html>
