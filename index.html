<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MAED Educational Management · Comprehensive Reviewer</title>
  <style>
    :root {
      --primary-color: #1e3b5c;
      --primary-light: #2f5170;
      --primary-dark: #143048;
      --secondary-color: #7aa9d4;
      --accent-color: #2b8c5e;
      --error-color: #c23b3b;
      --dark-bg: #1a2332;
      --light-bg: #f8faff;
      --border-color: #e6edf4;
      --text-dark: #1f3a4e;
      --text-muted: #4a627a;
      --success-bg: #f0f9f0;
      --error-bg: #fef5f5;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 6px 14px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 12px 28px rgba(0, 20, 40, 0.12);
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background: linear-gradient(135deg, #f5f7fc 0%, #f0f3fa 100%);
      margin: 0;
      overflow: hidden;
    }

    /* ---------- SIDEBAR (collapsible) ---------- */
    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, #1e2b3c 0%, #1a2332 100%);
      color: #e0e7ff;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 16px rgba(0, 0, 0, 0.1);
      transition: var(--transition);
      height: 100vh;
      overflow-y: auto;
      flex-shrink: 0;
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    .sidebar.collapsed {
      margin-left: -280px;
    }

    .sidebar-header {
      padding: 24px 20px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .sidebar-header h3 {
      font-weight: 600;
      font-size: 1.15rem;
      color: white;
      letter-spacing: 0.3px;
      background: linear-gradient(135deg, #ffffff 0%, #cbd5e8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .toggle-sidebar-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #ccd9f0;
      font-size: 18px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle-sidebar-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: white;
      transform: scale(1.05);
    }

    .subject-list {
      list-style: none;
      padding: 12px 0;
      margin: 0;
      flex: 1;
      overflow-y: auto;
    }

    .subject-item {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
      font-weight: 500;
      font-size: 0.95rem;
      color: #cbd5e8;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .subject-item i {
      font-style: normal;
      font-size: 1.1rem;
      transition: var(--transition);
    }

    .subject-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: white;
      padding-left: 24px;
    }

    .subject-item.active {
      background: linear-gradient(90deg, rgba(122, 169, 212, 0.15) 0%, rgba(122, 169, 212, 0.05) 100%);
      color: white;
      border-left: 4px solid var(--secondary-color);
      padding-left: 16px;
    }

    .subject-item.active i {
      transform: scale(1.1);
    }

    /* ---------- MAIN PANEL ---------- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      background: var(--light-bg);
      padding: 0 28px 28px 28px;
    }

    .main::-webkit-scrollbar {
      width: 8px;
    }

    .main::-webkit-scrollbar-track {
      background: transparent;
    }

    .main::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 4px;
    }

    .main::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.15);
    }

    .top-bar {
      display: flex;
      align-items: center;
      padding: 20px 0 12px;
      gap: 16px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .mobile-menu-btn {
      display: none;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%);
      color: white;
      border: none;
      font-size: 22px;
      padding: 8px 16px;
      border-radius: var(--radius-lg);
      cursor: pointer;
      box-shadow: var(--shadow-md);
      transition: var(--transition);
    }

    .mobile-menu-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .subject-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-dark);
      margin: 0;
      letter-spacing: -0.5px;
    }

    .quiz-container {
      max-width: 1020px;
      margin: 0 0 32px;
    }

    .question-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      transition: var(--transition);
    }

    .question-card:hover {
      box-shadow: var(--shadow-md);
      border-color: rgba(122, 169, 212, 0.3);
      transform: translateY(-2px);
    }

    .q-text {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 20px;
      color: var(--text-dark);
      line-height: 1.5;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      cursor: pointer;
    }

    .option:hover {
      background: rgba(122, 169, 212, 0.06);
    }

    .option input {
      accent-color: var(--secondary-color);
      width: 20px;
      height: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .option input:checked {
      box-shadow: 0 0 0 3px rgba(122, 169, 212, 0.2);
    }

    .option label {
      font-size: 1rem;
      color: var(--text-dark);
      cursor: pointer;
      line-height: 1.4;
    }

    .correct-highlight {
      border-left: 5px solid var(--accent-color);
      background: var(--success-bg);
    }

    .correct-highlight:hover {
      border-left: 5px solid var(--accent-color);
    }

    .wrong-highlight {
      border-left: 5px solid var(--error-color);
      background: var(--error-bg);
    }

    .wrong-highlight:hover {
      border-left: 5px solid var(--error-color);
    }

    .feedback-icon {
      margin-left: 8px;
      font-weight: 700;
      font-size: 1.1rem;
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .submit-area {
      margin-top: 24px;
      margin-bottom: 32px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
    }

    .submit-btn {
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%);
      color: white;
      border: none;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 14px 40px;
      border-radius: var(--radius-lg);
      cursor: pointer;
      box-shadow: var(--shadow-md);
      transition: var(--transition);
      letter-spacing: 0.3px;
    }

    .submit-btn:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    .submit-btn:active {
      transform: translateY(-1px);
    }

    .score-panel {
      background: linear-gradient(135deg, white 0%, rgba(122, 169, 212, 0.05) 100%);
      padding: 16px 32px;
      border-radius: var(--radius-lg);
      font-weight: 600;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      color: var(--text-dark);
      font-size: 1.1rem;
      min-width: 240px;
      text-align: center;
    }

    .reset-btn {
      background: linear-gradient(135deg, #f1f5f9 0%, #e8eef8 100%);
      border: 1.5px solid #bacddc;
      padding: 10px 24px;
      border-radius: var(--radius-lg);
      font-weight: 500;
      cursor: pointer;
      color: var(--primary-color);
      transition: var(--transition);
      font-size: 0.95rem;
    }

    .reset-btn:hover {
      background: linear-gradient(135deg, #e8eef8 0%, #dce4f0 100%);
      border-color: var(--secondary-color);
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }

    .reset-btn:active {
      transform: translateY(0);
    }

    /* mobile adaptation */
    @media (max-width: 720px) {
      body {
        flex-direction: column;
        overflow: hidden;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        z-index: 1000;
        width: 260px;
        box-shadow: 6px 0 24px rgba(0, 0, 0, 0.15);
      }

      .sidebar.collapsed {
        margin-left: -260px;
      }

      .mobile-menu-btn {
        display: inline-flex;
      }

      .main {
        padding: 0 18px 18px;
        width: 100%;
        overflow-y: auto;
      }

      .top-bar {
        padding-top: 14px;
        gap: 12px;
      }

      .subject-title {
        font-size: 1.5rem;
      }

      .question-card {
        padding: 20px;
        margin-bottom: 16px;
      }

      .quiz-container {
        margin: 0 0 24px;
      }

      .submit-btn {
        padding: 12px 28px;
        font-size: 1rem;
      }

      .score-panel {
        min-width: auto;
        font-size: 1rem;
        padding: 12px 20px;
      }

      .reset-btn {
        padding: 8px 18px;
        font-size: 0.9rem;
      }

      .q-text {
        font-size: 1rem;
      }

      .option label {
        font-size: 0.95rem;
      }
    }

    .progress-badge {
      font-size: 0.85rem;
      background: linear-gradient(135deg, #e1e9f2 0%, #d8e4eb 100%);
      padding: 6px 16px;
      border-radius: var(--radius-lg);
      color: var(--primary-color);
      font-weight: 600;
      border: 1px solid rgba(122, 169, 212, 0.2);
    }

    .footer-note {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .shuffle-btn {
      background: linear-gradient(135deg, var(--secondary-color) 0%, #6a92bc 100%);
      border: 1px solid rgba(122, 169, 212, 0.4);
      padding: 10px 22px;
      border-radius: var(--radius-lg);
      font-weight: 500;
      cursor: pointer;
      color: white;
      font-size: 0.95rem;
      transition: var(--transition);
      box-shadow: 0 4px 12px rgba(122, 169, 212, 0.2);
    }

    .shuffle-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(122, 169, 212, 0.3);
      background: linear-gradient(135deg, #6a92bc 0%, #5a82ac 100%);
    }

    .shuffle-btn:active {
      transform: translateY(0);
    }

    .summary-panel {
      background: white;
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
    }

    .summary-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 20px;
      text-align: center;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .subject-score-card {
      padding: 20px;
      border-radius: var(--radius-md);
      border-left: 5px solid var(--secondary-color);
      background: linear-gradient(135deg, #f8faff 0%, #f0f5fa 100%);
      transition: var(--transition);
    }

    .subject-score-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }

    .subject-score-card.strength {
      border-left-color: var(--accent-color);
      background: var(--success-bg);
    }

    .subject-score-card.weakness {
      border-left-color: var(--error-color);
      background: var(--error-bg);
    }

    .subject-name {
      font-weight: 600;
      color: var(--text-dark);
      font-size: 1rem;
      margin-bottom: 8px;
    }

    .subject-score-text {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 6px;
    }

    .subject-percentage {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .summary-footer {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 2px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .overall-stats {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-dark);
    }

    .strength-weakness-summary {
      font-size: 0.95rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <!-- COLLAPSIBLE SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>📘 MAED Subjects</h3>
      <button class="toggle-sidebar-btn" id="sidebarToggleBtn" title="Hide sidebar">✕</button>
    </div>
    <ul class="subject-list" id="subjectList"></ul>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <div class="top-bar">
      <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
      <h2 class="subject-title" id="currentSubjectTitle">Research Methodology</h2>
      <button class="shuffle-btn" id="shuffleBtn" title="Shuffle questions and options">🔀 Shuffle</button>
      <button class="reset-btn" id="resetAnswersBtn" title="Reset all answers and questions">↻ Reset</button>
      <span class="progress-badge" id="questionCountDisplay"></span>
    </div>
    <div id="quizContainer" class="quiz-container"></div>
    <div class="submit-area">
      <button class="submit-btn" id="submitAllBtn">✅ Submit Answers</button>
      <div class="score-panel" id="scorePanel">Score: — / — (—%)</div>
    </div>
    <div id="summaryPanel" class="summary-panel" style="display:none;"></div>
    <div class="submit-area">
      <button class="reset-btn" id="clearCurrentAnswersBtn">🗑️ Clear My Answers</button>
    </div>
    <div class="footer-note">⚡ Select answers, then click SUBMIT to see results.</div>
  </div>

  <script>
    (function(){
      'use strict';

      // ---------- DATA EXTRACTION (structured from document) ----------
      // Subjects with questions array. Each question: { text, options:['A. ...','B. ...', ...], answerIndex (0-based), subject }
      const subjects = [
        { id: 'research', name: '📊 Research Methodology', questions: [] },
        { id: 'stats', name: '📈 Statistics (t-test)', questions: [] },
        { id: 'found1', name: '🧠 Foundations of Ed (Part 1)', questions: [] },
        { id: 'found2', name: '📚 Foundations of Ed (Part 2)', questions: [] },
        { id: 'ed242', name: '💻 Ed 242 - IT in Education', questions: [] },
        { id: 'ed229', name: '🏫 Educ 229 - Mgmt Principles', questions: [] },
        { id: 'ed230', name: '📋 Educ 230 - Planning', questions: [] },
        { id: 'ed233', name: '🌟 Ed 233 - Educational Leadership', questions: [] },
        { id: 'ed234', name: '🤝 Educ 234 - Mgmt Behavior', questions: [] },
        { id: 'ed238', name: '👥 Educ 238 - Personnel Mgmt', questions: [] },
        { id: 'cognate210', name: '🌏 Cognate 210 - Comparative Ed', questions: [] },
        { id: 'ed239', name: '📐 Ed 239 - School Admin & Sup', questions: [] },
        { id: 'ed240', name: '💰 Educ 240 - Fiscal Management', questions: [] },
        { id: 'comprehensive', name: '🎯 Comprehensive Exam', questions: [], isComprehensive: true },
        { id: 'summary', name: '📊 Summary Analysis', questions: [], isSummary: true }
      ];

      // Helper to find subject index
      const subjectMap = Object.fromEntries(subjects.map((s,idx) => [s.id, idx]));

      // ----- RESEARCH METHODOLOGY (first 10 unique; duplicates removed) -----
      const researchQs = [
        { text: "A systematic investigation of certain phenomena characterized by gathering of data accurately, recording and critical analysis and interpretation of all facts about the phenomena.", options: ["A. Sample", "B. Title page", "C. Footnotes", "D. Research"], ans: 3 },
        { text: "It shows the title, full name of the author and the submission statement which include the faculty of school.", options: ["A. Research", "B. Introduction", "C. Title page", "D. Sample"], ans: 2 },
        { text: "Refers to a factor, characteristics or condition of a person, a group of persons, a thing, a program, an event and etc. which takes on values that can be measured categorically and quantitatively.", options: ["A. Tally sheet", "B. Sample", "C. Variables", "D. Questionnaires"], ans: 2 },
        { text: "A requirement for the completion of master's course and it is to be written by candidate for an academic degree.", options: ["A. Hypothesis", "B. Research", "C. Master's thesis", "D. Variables"], ans: 2 },
        { text: "The introductory paragraph under the main topical component merely enumerated the topical sections by subject areas that are to be covered in it.", options: ["A. Related literature", "B. Research instrument", "C. Bibliography", "D. Table of contents"], ans: 0 },
        { text: "Used to refer to groups of aggregates of people used as respondents in the process of gathering data information and other vital points which will enable the researcher to come up with accurate hypothesis.", options: ["A. Sample", "B. Population", "C. Hypothesis", "D. Acknowledgment"], ans: 1 },
        { text: "It explained in this section is the nature, coverage and time frame of the study.", options: ["A. Conceptual framework", "B. Importance of the study", "C. Definition of terms used", "D. Scope and delimitation of the study"], ans: 3 },
        { text: "It serves to orient the reader on what prompted the researchers to undertake the study and it gives a brief narrative explanation on the nature and background of the problem area in general and rationale of the study.", options: ["A. Introduction", "B. Statement of the problem", "C. Conceptual framework", "D. Sub-problems"], ans: 0 },
        { text: "The main component expounds on the theory, indicator and variables that led to the evolvement of the research problem and its corresponding hypothesis.", options: ["A. Statement of the problem", "B. Introduction", "C. Conceptual framework", "D. Title of the study"], ans: 2 },
        { text: "The details on the research or experimental instrument that was used are described by its nature, purpose, construction, content, validation, pre-testing and rationale for its use are explained.", options: ["A. Historical background", "B. Research instrument", "C. Research method", "D. Validation of research instrument"], ans: 1 }
      ];
      subjects[0].questions = researchQs;

      // ----- STATISTICS (6 items) -----
      subjects[1].questions = [
        { text: "Using the given problem, what is the average mean for Educational Leaders?", options: ["A. 3.75", "B. 3.76", "C. 3.77", "D. 3.78"], ans: 2 },
        { text: "What is the average mean for Teacher-respondents?", options: ["A. 3.76", "B. 3.77", "C. 3.78", "D. 3.79"], ans: 3 },
        { text: "What is the SD₁?", options: ["A. 0.0399", "B. 0.0400", "C. 0.0401", "D. 0.0410"], ans: 1 },
        { text: "What is the SD₂?", options: ["A. 0.0399", "B. 0.0400", "C. 0.0401", "D. 0.0410"], ans: 1 },
        { text: "What is the value of the computed t-test?", options: ["A. 0.707", "B. 0.700", "C. 0.701", "D. 0.770"], ans: 0 },
        { text: "Based on the result of the t-test computation, what is the decision and conclusion of the null hypothesis?", options: ["A. The null hypothesis is accepted while reject the alternative and the conclusion is significant.", "B. The null and alternative hypothesis are rejected and the conclusion is significant", "C. The null hypothesis is accepted and the conclusion is insignificant", "D. The null hypothesis is rejected and the conclusion is insignificant"], ans: 2 }
      ];

      // ED 216 FOUNDATIONS PART 1 (10 items)
      subjects[2].questions = [
        { text: "The science of mental discipline.", options: ["A. Metaphysics", "B. Ethics", "C. Logic", "D. Axiology"], ans: 2 },
        { text: "A philosophy that teaches the value of right and wrong.", options: ["A. Logic", "B. Ethics", "C. Axiology", "D. Ontology"], ans: 1 },
        { text: "One of the greatest influenced in the field of Education and teaching is the philosophy of idealism. Who is the Father of Idealism philosophy?", options: ["A. John Dewey", "B. Aristotle", "C. Plato", "D. B.F. Skinner"], ans: 2 },
        { text: "The Philosophy of socialism/communism influenced not only in the government system, the life of the people but more so in the area of Education. Who is the greatest socialist of all times?", options: ["A. Hegel", "B. Rene Descartes", "C. Carl Marx", "D. Martin Bauber"], ans: 2 },
        { text: "Existentialism is a philosophy that teaches 'Essence precedes existence'. Applied in Education it means 'knowledge come before the learning'. Who is the founder of existentialism?", options: ["A. Rene Descartes", "B. John Dewey", "C. Aristotle", "D. B.F. Skinner"], ans: 0 },
        { text: "In Psychology one of the hottest issues is not whether the egg or the hen coming first but rather it is this question, 'When does life begins?'", options: ["A. Upon birth", "B. Upon union of the egg cell and the sperm cell", "C. Upon conception", "D. Upon release of egg cell from the ovum"], ans: 1 },
        { text: "Education or learning outcomes depend much on the preparation of motivation provided according to who?", options: ["A. B.F. Skinner", "B. Edward Thorndike", "C. John Dewey", "D. Confucius"], ans: 1 },
        { text: "According to the Philosophy of Pragmatism, the role of Education is:", options: ["A. Utilitarianism or Practicality", "B. Exhibition", "C. For the future", "D. For preservation of knowledge"], ans: 0 },
        { text: "According to the government, the primary educational institution is:", options: ["A. The church", "B. The school", "C. The government", "D. The family"], ans: 3 },
        { text: "In education, the people know its roots through:", options: ["A. Religion", "B. Government", "C. Culture", "D. Business"], ans: 2 }
      ];

      // ED 216 FOUNDATIONS PART 2 (10 items)
      subjects[3].questions = [

      // Fisher-Yates shuffle algorithm
      function shuffleArray(arr) {
        const newArr = arr.slice(); // Create a copy
        for (let i = newArr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
      }

            text: opt,
            originalIndex: idx

          const shuffledOptions = shuffleArray(optionsWithIndices);

          const correctAnswerOriginalIndex = question.ans;

          li.className = `subject-item ${idx === currentSubjectIndex ? 'active' : ''}`;
          li.innerHTML = `<i>${subj.name.split(' ')[0]}</i> ${subj.name}`;
          li.addEventListener('click', () => {
            currentSubjectIndex = idx;
            submitted = false;
            renderCurrentSubject();
            renderSidebar();
            if (window.innerWidth < 720) sidebar.classList.add('collapsed');
          });
          subjectListEl.appendChild(li);
        });
      }

      function renderCurrentSubject() {
        const subj = subjects[currentSubjectIndex];
        currentSubjectTitle.textContent = subj.name;

        // Handle Summary tab display
        if (subj.isSummary) {
          renderSummaryAnalysis();
          return;
        }

        const questions = subj.questions;
        questionCountDisplay.textContent = `${questions.length} items`;

        let html = '';
        questions.forEach((q, qIdx) => {
          const globalKey = `${currentSubjectIndex}_${qIdx}`;
          const selected = userAnswers[globalKey] !== undefined ? userAnswers[globalKey] : null;
          let cardClass = 'question-card';
          if (submitted) {
            const isCorrect = (selected === q.ans);
            cardClass += isCorrect ? ' correct-highlight' : ' wrong-highlight';
          }
          html += `<div class="${cardClass}" data-qidx="${qIdx}">`;
          html += `<div class="q-text">${qIdx+1}. ${q.text}</div>`;
          html += `<div class="options">`;
          q.options.forEach((opt, optIdx) => {
            // Strip the letter prefix (A., B., C., D.) from the option text if it exists
            const optionText = opt.replace(/^[A-D]\.\s*/, '');
            const letter = String.fromCharCode(65 + optIdx); // Convert 0->A, 1->B, 2->C, 3->D
            const displayText = `${letter}. ${optionText}`;
            
            const checked = (selected === optIdx) ? 'checked' : '';
            html += `<div class="option">`;
            html += `<input type="radio" name="q${currentSubjectIndex}_${qIdx}" value="${optIdx}" id="opt_${currentSubjectIndex}_${qIdx}_${optIdx}" ${checked} data-subj="${currentSubjectIndex}" data-qidx="${qIdx}" data-opt="${optIdx}">`;
            html += `<label for="opt_${currentSubjectIndex}_${qIdx}_${optIdx}">${displayText}</label>`;
            if (submitted) {
              if (optIdx === q.ans) html += `<span class="feedback-icon" style="color:#2b8c5e;">✓</span>`;
              else if (selected === optIdx && selected !== q.ans) html += `<span class="feedback-icon" style="color:#c23b3b;">✗</span>`;
            }
            html += `</div>`;
          });
          html += `</div></div>`;
        });
        quizContainer.innerHTML = html;

        // Attach event listeners to radio buttons
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
          radio.addEventListener('change', (e) => {
            if (submitted) return;
            const subjIdx = parseInt(radio.dataset.subj);
            const qIdx = parseInt(radio.dataset.qidx);
            const opt = parseInt(radio.value);
            userAnswers[`${subjIdx}_${qIdx}`] = opt;
          });
        });

        updateScorePanel();
      }

      function updateScorePanel() {
        const subj = subjects[currentSubjectIndex];
        
        // For summary tab, show overall comprehensive exam score
        if (subj.isSummary) {
          let correct = 0;
          let total = 0;
          subjects[13].questions.forEach((q, qIdx) => {
            const key = `13_${qIdx}`;
            total++;
            if (userAnswers[key] === q.ans) correct++;
          });
          const percent = ((correct / total) * 100).toFixed(1);
          scorePanel.textContent = `🏆 Comprehensive Score: ${correct} / ${total} (${percent}%)`;
          return;
        }
        
        const questionsInCurrentView = subj.questions.length;
        
        if (!submitted) {
          // Count answers only for current subject
          let answered = 0;
          subj.questions.forEach((q, qIdx) => {
            const key = `${currentSubjectIndex}_${qIdx}`;
            if (userAnswers[key] !== undefined) answered++;
          });
          scorePanel.textContent = `📝 Answered: ${answered} / ${questionsInCurrentView}`;
        } else {
          // Calculate score for current subject or comprehensive exam
          let correct = 0;
          subj.questions.forEach((q, qIdx) => {
            const key = `${currentSubjectIndex}_${qIdx}`;
            if (userAnswers[key] === q.ans) correct++;
          });
          const percent = ((correct / questionsInCurrentView)*100).toFixed(1);
          scorePanel.textContent = `🏆 Score: ${correct} / ${questionsInCurrentView} (${percent}%)`;
        }
      }

      function renderSummaryAnalysis() {
        // Calculate scores for each subject (skip comprehensive at index 13 and summary at index 14)
        const subjectScores = [];
        for (let i = 0; i <= 12; i++) {
          const subj = subjects[i];
          let correct = 0;
          let total = subj.questions.length;
          
          subj.questions.forEach((q, qIdx) => {
            const key = `${i}_${qIdx}`;
            if (userAnswers[key] === q.ans) correct++;
          });
          
          const percentage = ((correct / total) * 100).toFixed(1);
          subjectScores.push({
            name: subj.name.replace(/^[🎯💻📊📈🧠📚🏫📋🌟🤝👥🌏📐💰]\s/, ''),
            correct,
            total,
            percentage: parseFloat(percentage)
          });
        }
        
        // Calculate comprehensive exam score
        let compCorrect = 0;
        let compTotal = 0;
        subjects[13].questions.forEach((q, qIdx) => {
          const key = `13_${qIdx}`;
          compTotal++;
          if (userAnswers[key] === q.ans) compCorrect++;
        });
        const compPercentage = ((compCorrect / compTotal) * 100).toFixed(1);
        
        // Calculate average to identify strengths and weaknesses
        const avgPercentage = subjectScores.length > 0 
          ? subjectScores.reduce((sum, s) => sum + s.percentage, 0) / subjectScores.length
          : 0;
        
        // Categorize strengths and weaknesses
        const strengths = subjectScores.filter(s => s.percentage >= avgPercentage + 10);
        const weaknesses = subjectScores.filter(s => s.percentage < avgPercentage - 10);
        
        // Build summary HTML
        let html = `<div style="padding: 20px 0;">`;
        
        // Overall score card
        html += `
          <div style="background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%); color: white; padding: 32px; border-radius: var(--radius-lg); margin-bottom: 24px; text-align: center;">
            <h2 style="margin: 0 0 16px 0; font-size: 1.3rem;">📊 Comprehensive Exam Score</h2>
            <div style="font-size: 3rem; font-weight: 800; margin-bottom: 8px;">${compPercentage}%</div>
            <div style="font-size: 1.1rem; opacity: 0.95;">${compCorrect} / ${compTotal} questions correct</div>
          </div>
        `;
        
        // Subject breakdown table
        html += `<div style="background: white; border-radius: var(--radius-lg); padding: 24px; border: 2px solid var(--border-color); margin-bottom: 24px;">`;
        html += `<h3 style="margin: 0 0 20px 0; color: var(--text-dark);">Subject Performance Breakdown</h3>`;
        html += `
          <div style="display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 12px; padding: 16px 8px; font-weight: 700; background: linear-gradient(135deg, #f8faff 0%, #f0f5fa 100%); border-bottom: 2px solid var(--border-color); border-radius: 4px 4px 0 0;">
            <div>Subject</div>
            <div style="text-align: center;">Score</div>
            <div style="text-align: center;">Percentage</div>
            <div style="text-align: center;">Status</div>
          </div>
        `;
        
        subjectScores.forEach(score => {
          let statusClass = 'fair';
          let statusText = '~ Fair';
          
          if (score.percentage >= 85) {
            statusClass = 'excellent';
            statusText = '✓ Excellent';
          } else if (score.percentage >= 70) {
            statusClass = 'good';
            statusText = '✓ Good';
          } else if (score.percentage >= 50) {
            statusClass = 'fair';
            statusText = '~ Fair';
          } else {
            statusClass = 'poor';
            statusText = '✗ Needs Work';
          }
          
          html += `
            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 12px; padding: 16px 8px; border-bottom: 1px solid var(--border-color); align-items: center;">
              <div style="font-weight: 600;">${score.name}</div>
              <div style="text-align: center;">${score.correct}/${score.total}</div>
              <div style="text-align: center; font-weight: 600;">${score.percentage}%</div>
              <div style="text-align: center; padding: 4px 8px; border-radius: 4px; font-size: 0.9rem; font-weight: 600; background: ${statusClass === 'excellent' ? 'var(--success-bg)' : statusClass === 'good' ? 'rgba(122, 169, 212, 0.15)' : statusClass === 'fair' ? 'rgba(255, 184, 28, 0.15)' : 'var(--error-bg)'}; color: ${statusClass === 'excellent' ? 'var(--accent-color)' : statusClass === 'good' ? 'var(--secondary-color)' : statusClass === 'fair' ? '#d68910' : 'var(--error-color)'};">${statusText}</div>
            </div>
          `;
        });
        
        html += `</div>`;
        
        // Strengths and Weaknesses
        if (strengths.length > 0 || weaknesses.length > 0) {
          html += `<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; margin-bottom: 24px;">`;
          
          if (strengths.length > 0) {
            html += `
              <div style="background: var(--success-bg); border-radius: var(--radius-lg); padding: 20px; border-left: 4px solid var(--accent-color);">
                <h4 style="margin: 0 0 12px 0; color: var(--accent-color);">⭐ Your Strengths</h4>
                <ul style="list-style: none; padding: 0; margin: 0;">
            `;
            strengths.forEach(s => {
              html += `<li style="padding: 8px 0; border-bottom: 1px solid rgba(43, 140, 94, 0.2);">${s.name}: <strong>${s.percentage}%</strong></li>`;
            });
            html += `</ul></div>`;
          }
          
          if (weaknesses.length > 0) {
            html += `
              <div style="background: var(--error-bg); border-radius: var(--radius-lg); padding: 20px; border-left: 4px solid var(--error-color);">
                <h4 style="margin: 0 0 12px 0; color: var(--error-color);">⚠️ Areas for Improvement</h4>
                <ul style="list-style: none; padding: 0; margin: 0;">
            `;
            weaknesses.forEach(w => {
              html += `<li style="padding: 8px 0; border-bottom: 1px solid rgba(194, 59, 59, 0.2);">${w.name}: <strong>${w.percentage}%</strong></li>`;
            });
            html += `</ul></div>`;
          }
          
          html += `</div>`;
        }
        
        // Summary statistics
        html += `
          <div style="background: white; border-radius: var(--radius-lg); padding: 24px; border: 2px solid var(--border-color);">
            <h3 style="margin: 0 0 16px 0; color: var(--text-dark);">📈 Summary Statistics</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
              <div style="padding: 16px; background: linear-gradient(135deg, var(--success-bg) 0%, rgba(43, 140, 94, 0.1) 100%); border-radius: 8px; border-left: 4px solid var(--accent-color);">
                <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px;">Average Score</div>
                <div style="font-size: 1.8rem; font-weight: 700; color: var(--accent-color);">${avgPercentage.toFixed(1)}%</div>
              </div>
              <div style="padding: 16px; background: linear-gradient(135deg, hsla(210, 100%, 50%, 0.1) 0%, rgba(122, 169, 212, 0.05) 100%); border-radius: 8px; border-left: 4px solid var(--secondary-color);">
                <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px;">Strength Areas</div>
                <div style="font-size: 1.8rem; font-weight: 700; color: var(--secondary-color);">${strengths.length}</div>
              </div>
              <div style="padding: 16px; background: linear-gradient(135deg, var(--error-bg) 0%, rgba(194, 59, 59, 0.1) 100%); border-radius: 8px; border-left: 4px solid var(--error-color);">
                <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px;">Areas to Improve</div>
                <div style="font-size: 1.8rem; font-weight: 700; color: var(--error-color);">${weaknesses.length}</div>
              </div>
            </div>
          </div>
        `;
        
        html += `</div>`;
        
        questionCountDisplay.textContent = '';
        quizContainer.innerHTML = html;
      }

      function submitAll() {
        submitted = true;
        // re-render current subject to show highlights
        renderCurrentSubject();
        updateScorePanel();
      }

      function resetCurrentSubjectAnswers() {
        // If on summary tab, just re-render and return
        if (currentSubjectIndex === 14) {
          renderCurrentSubject();
          updateScorePanel();
          return;
        }
        
        // Reset the current subject: clear answers and restore original questions
        const subj = subjects[currentSubjectIndex];
        
        // Clear answers for the current subject
        subj.questions.forEach((q, qIdx) => {
          delete userAnswers[`${currentSubjectIndex}_${qIdx}`];
        });
        
        // Restore original questions for this subject
        subj.questions = originalQuestions[currentSubjectIndex].map(q => ({
          text: q.text,
          options: [...q.options],
          ans: q.ans,
          subject: q.subject,
          subjectIndex: q.subjectIndex
        }));
        
        // Reset the submitted flag to show original unsubmitted state
        submitted = false;
        
        // Hide summary panel
        document.getElementById('summaryPanel').style.display = 'none';
        
        // Re-render with fresh questions and clear highlighting
        renderCurrentSubject();
        renderSidebar();
        updateScorePanel();
      }

      function resetAllAnswers() {
        // Reset answers and submitted state
        userAnswers = {};
        submitted = false;
        
        // Restore all subjects to original question order
        subjects.forEach((subj, idx) => {
          // Skip summary tab
          if (subj.isSummary) return;
          
          subj.questions = originalQuestions[idx].map(q => ({
            text: q.text,
            options: [...q.options],
            ans: q.ans,
            subject: q.subject,
            subjectIndex: q.subjectIndex
          }));
        });
        
        // Hide summary panel
        document.getElementById('summaryPanel').style.display = 'none';
        
        // Re-render the current subject
        renderCurrentSubject();
        renderSidebar();
        updateScorePanel();
      }

      // Toggle sidebar (collapsible)
      function toggleSidebar(force) {
        if (force !== undefined) sidebar.classList.toggle('collapsed', force);
        else sidebar.classList.toggle('collapsed');
      }

      // Mobile: open sidebar
      function openSidebarMobile() {
        sidebar.classList.remove('collapsed');
      }

      // Event listeners
      mobileMenuBtn.addEventListener('click', openSidebarMobile);
      sidebarToggleBtn.addEventListener('click', () => toggleSidebar());
      submitBtn.addEventListener('click', submitAll);
      resetBtn.addEventListener('click', resetCurrentSubjectAnswers);
      shuffleBtn.addEventListener('click', shuffleCurrentSubject);
      document.getElementById('clearCurrentAnswersBtn').addEventListener('click', resetCurrentSubjectAnswers);

      // Handle window resize to reset sidebar for desktop
      window.addEventListener('resize', () => {
        if (window.innerWidth > 720) sidebar.classList.remove('collapsed');
        else sidebar.classList.add('collapsed');
      });

      // Initialize
      function init() {
        renderSidebar();
        renderCurrentSubject();
        if (window.innerWidth <= 720) sidebar.classList.add('collapsed');
      }
      init();
    })();
  </script>
</body>
</html>
